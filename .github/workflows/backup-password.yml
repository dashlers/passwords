# This is a basic workflow to help you get started with Actions

name: backup-password

# Controls when the workflow will run
on:
  workflow_dispatch: 

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  backup-password:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Gives the action permission to write changes back to the repository
    permissions:
      contents: write
      
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Grab password
        run: curl -L https://drive.google.com/uc?export=download&id=1-zNzjqc1j21o1KiI1qEjbtADMaTq77Mr -o passwords.kdbx

      # Runs a set of commands using the runners shell
      - name: Save to Repo
        run: |
          # Configure Git Bot credentials
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the specific file
          git add passwords.kdbx
          
          # Commit and push only if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes detected in the downloaded file."
          else
            git commit -m "chore: auto-update file via curl"
            git push origin main
          fi
